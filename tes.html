<script>
    const container = document.getElementsByClassName("test-click");

container.addEventListener("click", function (e) {
  const rect = this.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 100;
  const y = ((e.clientY - rect.top) / rect.height) * 100;
  alert(`this are the pin cordinates x: ${x.toFixed(4)}%, y: ${y.toFixed(4)}%`);

  // Create pin
  const pin = document.createElement("div");
  pin.classList.add("pin");
  pin.style.top = `${y}%`;
  pin.style.left = `${x}%`;
  pin.setAttribute("data-label", `Pin at ${Math.round(x)}%, ${Math.round(y)}%`);

  this.appendChild(pin);
  console.log("Pinned at:", x.toFixed(2), y.toFixed(2));
});
